<!DOCTYPE html>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1F2937;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      justify-content: center;

      text-align: center;

    .container {

    .button {
      display: inline-block;
      background: #16A34A;
      color: #FFFFFF;
      text-decoration: none;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 800;
    }

    .button:hover {
      background: #15803D;
    }

    .footer {
      margin-top: 28px;
      color: #9CA3AF;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .logo {
